<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autoland Erfurt – KI-Assistent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .chat {
      width: 390px;
      max-width: 100vw;
      height: 620px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #cc0000, #e80000);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .avatar-logo {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; font-size: 18px;
    }
    .header-title { color: #fff; font-weight: 700; font-size: 16px; }
    .header-sub { color: rgba(255,255,255,0.85); font-size: 12px; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .dot-online { width: 7px; height: 7px; border-radius: 50%; background: #7fff7f; box-shadow: 0 0 6px #7fff7f; display: inline-block; }
    .messages {
      flex: 1; overflow-y: auto; padding: 14px 16px 0; background: #fafafa;
    }
    .info-bar {
      background: #fff5f5; border-left: 3px solid #cc0000;
      padding: 8px 12px; font-size: 11px; color: #888;
      border-radius: 6px; margin-bottom: 10px;
    }
    .msg { display: flex; margin-bottom: 10px; }
    .msg.user { justify-content: flex-end; }
    .msg.bot { justify-content: flex-start; align-items: flex-end; gap: 8px; }
    .bot-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #cc0000, #e80000);
      color: #fff; font-weight: 700; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .bubble {
      padding: 10px 14px; font-size: 14px; line-height: 1.5;
      max-width: 75%; border-radius: 18px;
    }
    .bubble.bot {
      background: #fff; border: 1px solid #eee;
      border-radius: 18px 18px 18px 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); color: #222;
    }
    .bubble.user {
      background: linear-gradient(135deg, #cc0000, #e80000);
      border-radius: 18px 18px 4px 18px; color: #fff;
    }
    .typing span {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #cc0000; margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .quick-wrap {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 10px 16px; background: #fafafa;
      border-top: 1px solid #f0f0f0;
    }
    .quick-btn {
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; color: #cc0000; cursor: pointer;
      font-weight: 500; font-family: inherit;
    }
    .input-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: #fff;
      border-top: 1px solid #f0f0f0;
    }
    textarea {
      flex: 1; border: 1.5px solid #e0e0e0; border-radius: 20px;
      padding: 9px 14px; font-size: 14px; resize: none;
      outline: none; font-family: inherit; line-height: 1.4;
      color: #222; background: #fafafa;
    }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #cc0000, #e80000);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .send-btn:disabled { opacity: 0.5; cursor: default; }
    .footer {
      text-align: center; font-size: 11px; color: #bbb;
      padding: 6px; background: #fff;
    }
  </style>
</head>
<body>
<div class="chat">
  <div class="header">
    <div class="header-left">
      <div class="avatar-logo">A</div>
      <div>
        <div class="header-title">Autoland Erfurt</div>
        <div class="header-sub">
          <span class="dot-online"></span> Online – Jetzt chatten
        </div>
      </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="info-bar">📍 Heinrich-Credner-Str. 4, Erfurt &nbsp;|&nbsp; 📞 0361 73939555</div>
    <div class="msg bot">
      <div class="bot-avatar">A</div>
      <div class="bubble bot">Hallo! 👋 Ich bin der virtuelle Assistent von Autoland Erfurt. Wie kann ich dir heute helfen?</div>
    </div>
  </div>

  <div class="quick-wrap" id="quickWrap">
    <button class="quick-btn" onclick="sendMessage('Wann habt ihr geöffnet?')">Wann habt ihr geöffnet?</button>
    <button class="quick-btn" onclick="sendMessage('Welche Marken führt ihr?')">Welche Marken führt ihr?</button>
    <button class="quick-btn" onclick="sendMessage('Wie funktioniert die Finanzierung?')">Wie funktioniert die Finanzierung?</button>
    <button class="quick-btn" onclick="sendMessage('Kann ich mein Auto in Zahlung geben?')">Kann ich mein Auto in Zahlung geben?</button>
  </div>

  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Deine Frage..." onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2" fill="white"/>
      </svg>
    </button>
  </div>
  <div class="footer">Powered by KI-Agent · autoland.de</div>
</div>

<script>
const SYSTEM_PROMPT = `Du bist ein freundlicher KI-Kundenservice-Agent für Autoland AG – Niederlassung Erfurt, Deutschlands größtem Autodiscounter.

Unternehmensdaten:
- Adresse: Heinrich-Credner-Str. 4, 99087 Erfurt
- Telefon: +49 361 73939555
- E-Mail: erfurt@autoland.de
- Website: autoland.de/autoland-niederlassungen/erfurt

Öffnungszeiten:
- Mo.–Fr.: 09:00–20:00 Uhr
- Sa.: 09:00–18:00 Uhr
- So. & Feiertage: Autoschau von 09:00–18:00 Uhr (kein Verkauf/keine Beratung)

Leistungen:
- Neu-, Jahres- und Gebrauchtwagenkauf (alle Marken: VW, Audi, BMW, Mercedes-Benz, Ford, Opel, Skoda u.v.m.)
- Hybrid- und Elektrofahrzeuge
- Flexible Finanzierung ab 0 % Anzahlung, Laufzeiten bis 120 Monate
- Kostenlose Probefahrten
- Inzahlungnahme des alten Fahrzeugs
- Garantiepakete
- Fahrzeugzulassung – alles aus einer Hand

Besonderheiten:
- Neuwagen bis zu 30 % günstiger als UVP
- Jahreswagen bis zu 40 % günstiger als UVP
- Bestpreisgarantie auf Gebrauchtwagen
- Sofortige Verfügbarkeit – keine Lieferzeit
- Über 15.000 Fahrzeuge bundesweit, 37 Standorte

Deine Aufgabe:
- Beantworte Kundenfragen freundlich, kurz und klar auf Deutsch
- Beziehe dich nur auf die oben genannten Informationen
- Bei komplexen Anliegen verweise ans Team: Telefon +49 361 73939555 oder erfurt@autoland.de
- Mache niemals Preisversprechen für konkrete Fahrzeuge
- Antworte immer in du-Form`;

let messages = [];
let loading = false;

const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const messagesDiv = document.getElementById('messages');
const quickWrap = document.getElementById('quickWrap');

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || loading;
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  if (role === 'bot') {
    msg.innerHTML = `<div class="bot-avatar">A</div><div class="bubble bot">${content}</div>`;
  } else {
    msg.innerHTML = `<div class="bubble user">${content}</div>`;
  }
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return msg;
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing';
  msg.innerHTML = `<div class="bot-avatar">A</div><div class="bubble bot typing"><span></span><span></span><span></span></div>`;
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage(text) {
  const userText = text || input.value.trim();
  if (!userText || loading) return;

  input.value = '';
  sendBtn.disabled = true;
  loading = true;
  quickWrap.style.display = 'none';

  messages.push({ role: 'user', content: userText });
  addMessage('user', userText);
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await res.json();
    const reply = data?.content?.[0]?.text || 'Entschuldigung, ich konnte keine Antwort generieren.';
    messages.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('bot', reply);
  } catch {
    removeTyping();
    addMessage('bot', 'Es gab einen Verbindungsfehler. Bitte ruf uns an: +49 361 73939555');
  }

  loading = false;
  sendBtn.disabled = false;
}
</script>
</body>
</html>
